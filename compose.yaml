services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: verve-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password123!
      - MSSQL_PID=Express
    ports:
      - "1437:1433"

    volumes:
      - ./init-db.sql:/init-db.sql

    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Password123!", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    entrypoint: >
      /bin/bash -c "
      /opt/mssql/bin/sqlservr & 
      echo 'Waiting for SQL Server to start...';
      sleep 20;
      echo 'Creating database...';
      /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password123!' -i /init-db.sql;
      wait
      "

volumes:
  sqlserver_data: