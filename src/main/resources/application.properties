spring.application.name=VerveGaurd

spring.datasource.url=jdbc:sqlserver://localhost:${SQL_PORT:1434};databaseName=${DB_NAME:mydb};trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=${SA_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#spring.datasource.hikari.connection-init-sql=USE ${DB_NAME:mydb}
# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true

# JWT
jwt.secret=your-very-long-secret-key-must-be-at-least-32-characters-long
jwt.expiration=3600000

spring.security.user.name=admin
spring.security.user.password=password123

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
spring.web.error.include-message=always
spring.web.error.include-stacktrace=always

