spring.application.name=VerveGaurd

spring.datasource.url=jdbc:sqlserver://localhost:1437;databaseName=mydb;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Password123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#spring.datasource.hikari.connection-init-sql=USE ${DB_NAME:mydb}
# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.docker.compose.enabled=true

# flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true
logging.level.org.flywaydb=DEBUG

# JWT
jwt.secret=your-very-long-secret-key-must-be-at-least-32-characters-long
jwt.expiration=3600000

spring.security.user.name=admin
spring.security.user.password=password123

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
spring.web.error.include-message=always
spring.web.error.include-stacktrace=always

# Encryption secret
encryption.secret=9ISltMZeH7HgXaXR7ufi7WeWYcSSlJyLav4Ol9uKlS88

# HikariCP Connection Pool Tuning
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# Logging
logging.level.root=warn

# Show full health details
management.endpoint.health.show-details=always

# Expose all actuator endpoints (not just health)
management.endpoints.web.exposure.include=health,info,metrics,env

# Logging - File output configuration
logging.file.name=logs/verveguard.log
logging.file.max-size=50MB
logging.file.max-history=30
